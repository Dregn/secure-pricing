query CartTransformRunInput {
  cart {
    lines {
      id
      quantity
      pieces: attribute(key: "Pieces") {
        value
      }
      source: attribute(key: "_custom_pricing_source") {
        value
      }
      width: attribute(key: "_cp_width") {
        value
      }
      height: attribute(key: "_cp_height") {
        value
      }
      unit: attribute(key: "_cp_unit") {
        value
      }
      pricingVersion: attribute(key: "_cp_pricing_version") {
        value
      }
      computedTotal: attribute(key: "_computed_total") {
        value
      }
      debugFlag: attribute(key: "_cp_debug") {
        value
      }
      selectedOptions: attribute(key: "_cp_selected_options") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          title
          product {
            title
            metafield(namespace: "app--327440302081--pricing", key: "pricing_rule") {
              value
            }
            pricingRuleJson: metafield(namespace: "app--327440302081--pricing", key: "pricing_rule_json") {
              jsonValue
              value
            }
          }
        }
      }
    }
  }
}
