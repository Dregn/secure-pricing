scopes = "customer_read_metaobjects,read_all_cart_transforms,read_cart_transforms,read_metaobject_definitions,read_metaobjects,read_products,read_themes,read_validations,unauthenticated_read_metaobjects,write_cart_transforms,write_metaobject_definitions,write_metaobjects,write_products,write_theme_code,write_themes,write_validations"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ ]

[build]
automatically_update_urls_on_dev = false
